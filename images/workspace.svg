<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo com gradiente suave -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4F7FA" stop-opacity="1"/>
      <stop offset="100%" stop-color="#E0E6ED" stop-opacity="1"/>
    </linearGradient>
  </defs>
  
  <!-- Retângulo de fundo -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <!-- Mesa de trabalho -->
  <rect x="50" y="350" width="700" height="30" fill="#7D5A50" rx="5"/>
  <rect x="80" y="380" width="20" height="200" fill="#7D5A50"/>
  <rect x="700" y="380" width="20" height="200" fill="#7D5A50"/>
  
  <!-- Notebook/Laptop -->
  <g transform="translate(250, 200)">
    <!-- Base do laptop -->
    <rect x="0" y="100" width="300" height="20" rx="5" fill="#333333"/>
    <rect x="20" y="90" width="260" height="10" rx="2" fill="#444444"/>
    
    <!-- Tela do laptop -->
    <rect x="30" y="0" width="240" height="150" rx="5" fill="#333333"/>
    <rect x="40" y="10" width="220" height="130" fill="#0A2240"/>
    
    <!-- Código na tela -->
    <g fill="#FFC107" font-family="monospace" font-size="8">
      <text x="50" y="30">function createStudyPlan() {</text>
      <text x="60" y="45">  const plan = new StudyPlan();</text>
      <text x="60" y="60">  plan.addSubject('Direito Penal');</text>
      <text x="60" y="75">  plan.addSubject('Direito Constitucional');</text>
      <text x="60" y="90">  plan.scheduleReviews();</text>
      <text x="60" y="105">  return plan;</text>
      <text x="50" y="120">}</text>
    </g>
  </g>
  
  <!-- Xícara de café -->
  <g transform="translate(600, 280)">
    <ellipse cx="25" cy="10" rx="25" ry="10" fill="#333333"/>
    <path d="M0,10 Q0,50 25,50 Q50,50 50,10" fill="#5E3A21"/>
    <path d="M50,20 Q70,25 65,40 Q60,45 50,40" fill="#333333"/>
  </g>
  
  <!-- Livros empilhados -->
  <g transform="translate(100, 250)">
    <rect x="0" y="0" width="100" height="20" fill="#0A2240" rx="2"/>
    <rect x="5" y="20" width="100" height="25" fill="#FFC107" rx="2"/>
    <rect x="-5" y="45" width="100" height="15" fill="#333333" rx="2"/>
    <rect x="10" y="60" width="90" height="30" fill="#0A2240" rx="2"/>
  </g>
  
  <!-- Caderno com anotações -->
  <g transform="translate(600, 200)">
    <rect x="0" y="0" width="120" height="150" fill="#FFFFFF" rx="3"/>
    <line x1="0" y1="30" x2="120" y2="30" stroke="#CCCCCC" stroke-width="1"/>
    <line x1="0" y1="60" x2="120" y2="60" stroke="#CCCCCC" stroke-width="1"/>
    <line x1="0" y1="90" x2="120" y2="90" stroke="#CCCCCC" stroke-width="1"/>
    <line x1="0" y1="120" x2="120" y2="120" stroke="#CCCCCC" stroke-width="1"/>
    
    <!-- Texto simulado -->
    <line x1="10" y1="15" x2="100" y2="15" stroke="#333333" stroke-width="1"/>
    <line x1="10" y1="45" x2="80" y2="45" stroke="#333333" stroke-width="1"/>
    <line x1="10" y1="75" x2="110" y2="75" stroke="#333333" stroke-width="1"/>
    <line x1="10" y1="105" x2="90" y2="105" stroke="#333333" stroke-width="1"/>
    <line x1="10" y1="135" x2="70" y2="135" stroke="#333333" stroke-width="1"/>
  </g>
</svg>