<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo com gradiente -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2240" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#051529" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  
  <!-- Retângulo de fundo -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  
  <!-- Padrão abstrato de linhas -->
  <g opacity="0.1" stroke="#FFC107" stroke-width="1">
    <!-- Linhas horizontais -->
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    
    <!-- Linhas verticais -->
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="1000" y1="0" x2="1000" y2="800"/>
  </g>
  
  <!-- Elementos abstratos que representam livros e materiais de estudo -->
  <g transform="translate(100, 200)" opacity="0.2">
    <!-- Livros empilhados -->
    <rect x="0" y="0" width="150" height="30" fill="#FFC107"/>
    <rect x="10" y="30" width="150" height="30" fill="#FFFFFF"/>
    <rect x="5" y="60" width="150" height="30" fill="#FFC107"/>
    <rect x="15" y="90" width="150" height="30" fill="#FFFFFF"/>
  </g>
  
  <g transform="translate(900, 500)" opacity="0.2">
    <!-- Notebook/Laptop -->
    <rect x="0" y="0" width="200" height="120" rx="5" fill="#FFFFFF"/>
    <rect x="10" y="10" width="180" height="100" fill="#0A2240"/>
  </g>
  
  <!-- Elementos decorativos -->
  <g opacity="0.15">
    <!-- Círculos decorativos -->
    <circle cx="200" cy="700" r="50" fill="#FFC107"/>
    <circle cx="1000" cy="150" r="80" fill="#FFC107"/>
    <circle cx="600" cy="400" r="100" fill="#FFFFFF"/>
  </g>
</svg>